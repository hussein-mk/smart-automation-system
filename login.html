<input class="w-full bg-transparent border-none focus:ring-0 text-on-surface font-body-md pr-xl py-base text-body-lg" id="username" placeholder="example@prosys.com" style="font-family: &quot;Noto Kufi Arabic&quot;, sans-serif;" type="text">
</div>
</div>
<!-- Password Field -->
<div class="space-y-xs">
<label class="font-label-md text-on-surface-variant block text-body-md" for="password">كلمة المرور</label>
<div class="relative group input-focus-effect border border-outline-variant rounded-lg bg-surface-container-low transition-all duration-200">
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full bg-transparent border-none focus:ring-0 text-on-surface font-body-md pr-xl py-base text-body-lg" id="password" placeholder="••••••••" style="font-family: &quot;Noto Kufi Arabic&quot;, sans-serif;" type="password">
<button class="absolute left-md top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Options -->

<input class="w-4 h-4 rounded border-outline-variant bg-surface-container-low text-primary focus:ring-primary focus:ring-offset-background transition-all text-body-lg" type="checkbox">
<span class="font-label-md text-label-md text-on-surface-variant group-hover:text-on-surface">تذكرني</span>
</label>
<a class="font-label-md text-label-md text-primary hover:text-primary-fixed-dim transition-colors" href="#">نسيت كلمة المرور؟</a>

<script>
    // Simple micro-interaction for the login button
    const loginBtn = document.querySelector('button[type="submit"]');
    loginBtn.addEventListener('click', () => {
        const span = loginBtn.querySelector('span:first-child');
        const originalText = span.textContent;
        span.textContent = 'جاري التحقق...';
        loginBtn.classList.add('opacity-80', 'cursor-wait');
        
        setTimeout(() => {
            window.location.href = 'index.html';
        }, 1500);
    });
</script>
